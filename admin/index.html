<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachetBank Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-8">

    <header class="mb-8 border-b border-slate-800 pb-5 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black text-white">SachetBank Cloud Management</h1>
        </div>
        <button onclick="document.getElementById('addShopModal').showModal()" 
                class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg font-bold cursor-pointer">
            + Add New Shop
        </button>
    </header>

    <nav class="flex border-b border-slate-800 mb-6 gap-2 text-sm font-bold">
        <button onclick="switchTab('aggregators')" id="tab-aggregators" class="tab-btn px-4 py-2.5 border-b-2 border-emerald-500 text-emerald-400">Aggregator Registry</button>
        <button onclick="switchTab('donors')" id="tab-donors" class="tab-btn px-4 py-2.5 border-b-2 border-transparent text-slate-400">Donor Ledger</button>
    </nav>

    <dialog id="addShopModal" class="bg-slate-900 border border-slate-700 rounded-xl p-6 w-full max-w-md text-slate-100 backdrop:bg-black/50">
        <h2 class="text-xl font-bold mb-4">Register New Terminal</h2>
        <form id="addShopForm" class="space-y-4">
            <input type="text" name="shop_name" placeholder="Shop Name" class="w-full bg-slate-800 p-2 rounded border border-slate-700" required>
            <input type="text" name="owner_phone" placeholder="Owner Phone (234...)" class="w-full bg-slate-800 p-2 rounded border border-slate-700" required>
            <input type="text" name="address" placeholder="Street Address" class="w-full bg-slate-800 p-2 rounded border border-slate-700">
            <div class="flex justify-end gap-3 mt-6">
                <button type="button" onclick="document.getElementById('addShopModal').close()" class="text-slate-400">Cancel</button>
                <button type="submit" class="bg-emerald-600 px-4 py-2 rounded font-bold">Save Terminal</button>
            </div>
        </form>
    </dialog>

    <section id="panel-aggregators" class="tab-panel bg-slate-900 border border-slate-800 rounded-xl p-6">
        <table class="w-full text-left text-sm">
            <thead class="text-xs uppercase text-slate-500 border-b border-slate-800">
                <tr><th class="px-4 py-3">ID</th><th class="px-4 py-3">Shop</th><th class="px-4 py-3">Phone</th><th class="px-4 py-3">Wallet</th></tr>
            </thead>
            <tbody id="aggregatorTableBody"></tbody>
        </table>
    </section>

    <script>
        const webhookUrl = 'https://api.presibo.com/sachetbank/webhook.php';

        // 1. Fetch & Render
        async function fetchDashboardData() {
            const res = await fetch(webhookUrl, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({admin_action: 'GET_AGGREGATORS'}) 
            });
            const data = await res.json();
            const tbody = document.getElementById('aggregatorTableBody');
            tbody.innerHTML = data.map(row => `
                <tr class="border-b border-slate-800">
                    <td class="px-4 py-3 text-emerald-500 font-bold">${row.Aggregator_ID}</td>
                    <td class="px-4 py-3">${row.Shop_Name}</td>
                    <td class="px-4 py-3">${row.Owner_Phone}</td>
                    <td class="px-4 py-3 font-mono">₦${parseFloat(row.Current_Cash_Wallet || 0).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        // 2. Handle Form Submission
        document.getElementById('addShopForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = Object.fromEntries(new FormData(e.target));
            payload.admin_action = 'ADD_AGGREGATOR';

            await fetch(webhookUrl, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            document.getElementById('addShopModal').close();
            e.target.reset();
            fetchDashboardData();
        });

        // 3. Init
        window.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>
</html>
