<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachetBank Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Forces the native dialog to center correctly */
        dialog::backdrop { background: rgba(0, 0, 0, 0.7); }
        dialog[open] { display: flex; flex-direction: column; justify-content: center; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-8">

    <header class="mb-8 border-b border-slate-800 pb-5 flex justify-between items-center">
        <h1 class="text-3xl font-black text-white">SachetBank Cloud Management</h1>
        <button onclick="document.getElementById('addShopModal').showModal()" 
                class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg font-bold cursor-pointer">
            + Add New Shop
        </button>
    </header>

    <nav class="flex border-b border-slate-800 mb-6 gap-2 text-sm font-bold">
        <button onclick="switchTab('aggregators')" id="btn-aggregators" class="tab-btn px-4 py-2.5 border-b-2 border-emerald-500 text-emerald-400">Aggregator Registry</button>
        <button onclick="switchTab('donors')" id="btn-donors" class="tab-btn px-4 py-2.5 border-b-2 border-transparent text-slate-400">Donor Ledger</button>
    </nav>

    <dialog id="addShopModal" class="bg-slate-900 border border-slate-700 rounded-xl p-6 w-full max-w-md shadow-2xl">
        <h2 class="text-xl font-bold mb-4">Register New Terminal</h2>
        <form id="addShopForm" class="space-y-4">
            <input type="text" name="shop_name" placeholder="Shop Name" class="w-full bg-slate-800 p-2 rounded border border-slate-700" required>
            <input type="text" name="owner_phone" placeholder="Owner Phone (234...)" class="w-full bg-slate-800 p-2 rounded border border-slate-700" required>
            <div class="flex justify-end gap-3 mt-6">
                <button type="button" onclick="document.getElementById('addShopModal').close()" class="text-slate-400">Cancel</button>
                <button type="submit" class="bg-emerald-600 px-4 py-2 rounded font-bold">Save</button>
            </div>
        </form>
    </dialog>

    <section id="panel-aggregators" class="tab-panel bg-slate-900 border border-slate-800 rounded-xl p-6">
        <table class="w-full text-left text-sm"><tbody id="aggregatorTableBody"></tbody></table>
    </section>
    <section id="panel-donors" class="tab-panel hidden bg-slate-900 border border-slate-800 rounded-xl p-6">
        <table class="w-full text-left text-sm"><tbody id="donorTableBody"></tbody></table>
    </section>

    <script>
        const webhookUrl = 'https://api.presibo.com/sachetbank/webhook.php';

        function switchTab(tabId) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-emerald-500', 'text-emerald-400');
                b.classList.add('border-transparent', 'text-slate-400');
            });
            document.getElementById('panel-' + tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('border-emerald-500', 'text-emerald-400');
        }

        async function fetchDashboardData() {
            // Fetch Aggregators
            const r1 = await fetch(webhookUrl, {method:'POST', body: JSON.stringify({admin_action:'GET_AGGREGATORS'})});
            const d1 = await r1.json();
            document.getElementById('aggregatorTableBody').innerHTML = d1.map(row => `<tr><td class="py-3 text-emerald-500">${row.Shop_Name}</td></tr>`).join('');
            
            // Fetch Donors
            const r2 = await fetch(webhookUrl, {method:'POST', body: JSON.stringify({admin_action:'GET_DONORS'})});
            const d2 = await r2.json();
            document.getElementById('donorTableBody').innerHTML = d2.map(row => `<tr><td class="py-3 text-amber-500">${row.Full_Name}</td></tr>`).join('');
        }

        window.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>
</html>
